version: 0.2

phases:
  build:
    commands:
      - rm -rf /root/.dotnet
      - curl -sSL https://dot.net/v1/dotnet-install.sh | bash /dev/stdin --channel 10.0 --install-dir /root/.dotnet
      - find . -name global.json -type f -delete
      - rm -f /codebuild/global.json
      - export PATH="/root/.dotnet:$PATH"
      - dotnet --version
      - cd MeetVerseBackend/MeetVerse.Api
      - dotnet restore
      - dotnet build -c Release
      - dotnet publish -c Release -r linux-x64 --self-contained false -o ../../publish_output
      - cd ../../publish_output
      - ls -la
      - find . -name "*.runtimeconfig.json"

artifacts:
  base-directory: publish_output
  files:
    - '**/*'
